# pytorch_lightning==1.7.6
seed_everything: true
trainer:

    # comment this line out if you're training without a gpu
    accelerator: 'gpu'
    
    # number of epochs to run for. `-1` means run forever (until you interrupt manually)
    max_epochs: -1
    
    devices: 1
    precision: bf16-mixed

    enable_checkpointing: true
    callbacks:
        - # keep the best performing checkpoint
            class_path: pytorch_lightning.callbacks.ModelCheckpoint
            init_args:
                monitor: val/loss
                mode: min
                save_top_k: 1
        - # learning rate monitor
            class_path: pytorch_lightning.callbacks.LearningRateMonitor

    logger:
        class_path: pytorch_lightning.loggers.TensorBoardLogger
        init_args:
            save_dir: runs
            name: denoiser

    accumulate_grad_batches: 1
    enable_progress_bar: true
    log_every_n_steps: 5
    enable_model_summary: true

    # val_check_interval: { 'minutes': 10 }
    # check_val_every_n_epoch: 1

    gradient_clip_val: 1.
    
data:
    # length of each training subsequence
    seq_len: 4096 # * 6ms/frame ~= 24.6s
    
    # size of training batch
    batch_size: 64
    
    # number of workers to use for data loading
    num_workers: 13
    
    # number of samples to hold out for validation
    # must be at least one in order to render validation plots
    val_size: 128

    # per-worker shuffle buffer (in windows); >1 decorrelates consecutive
    # windows emitted from the same beatmap. 1 disables buffering.
    shuffle_buffer_size: 512
    
model:
    # validation parameters
    val_steps: 16
    val_batches: 8

    # training parameters
    opt_args:
        lr: .0002
        weight_decay: 0.01
    label_drop_prob: .2

    # model hyperparameters
    latent_model_ckpt: latent.ckpt

    style_prior_args:
        noise_level_features: 64
        h_dim: 256
        depth: 4

    diffusion_args:
        noise_level_features: 256
        global_cond_dim: 512

        backbone_dim: 512
        backbone_args:
            head_dim: 64
            depth: 16
            expand: 4
            radius: 2